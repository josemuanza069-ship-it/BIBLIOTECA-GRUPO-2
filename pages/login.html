<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Login </title>
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>
    <div class="login-container">
        <form action="interface.php" method="$_POST">
            <h2> Login </h2>
            <p> Seja Bem-Vindo, faça login para acessar ao sistema </p>
            <div class="login-itens">
                <label for="email"> Email <label>
                <input type="email" name="email" id="email" placeholder="Insira o seu Email" required>
            </div>

            <div class="login-itens">
                <label for="password"> Senha </label>
                <input type="password" name="senha" id="senha" placeholder="Insira a sua senha" required>
            </div>
            <div class="btn">
                <button type="submit" class="btn-input"> Entrar </button>
            </div>
        </form>
    </div>
</body>
</html>
